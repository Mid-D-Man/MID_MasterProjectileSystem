name: Build Rust Native Libs

on:
  push:
    branches: [main]
    paths:
      - 'projectile_core/**'
  workflow_dispatch:

jobs:

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            projectile_core/target
          key: macos-cargo-${{ hashFiles('projectile_core/Cargo.toml') }}
          restore-keys: macos-cargo-

      - name: Build x86_64
        working-directory: projectile_core
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        working-directory: projectile_core
        run: cargo build --release --target aarch64-apple-darwin

      - name: Lipo universal dylib
        working-directory: projectile_core
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/libprojectile_core.dylib \
            target/aarch64-apple-darwin/release/libprojectile_core.dylib \
            -output libprojectile_core.dylib
          lipo -info libprojectile_core.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: native-macos
          path: projectile_core/libprojectile_core.dylib
          retention-days: 1

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install mingw cross-compiler
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            projectile_core/target
          key: windows-cargo-${{ hashFiles('projectile_core/Cargo.toml') }}
          restore-keys: windows-cargo-

      - name: Configure mingw linker
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          EOF

      - name: Build
        working-directory: projectile_core
        run: cargo build --release --target x86_64-pc-windows-gnu

      - uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: projectile_core/target/x86_64-pc-windows-gnu/release/projectile_core.dll
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            projectile_core/target
          key: linux-cargo-${{ hashFiles('projectile_core/Cargo.toml') }}
          restore-keys: linux-cargo-

      - name: Build
        working-directory: projectile_core
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: projectile_core/target/release/libprojectile_core.so
          retention-days: 1

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version "^3" --locked

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            projectile_core/target
          key: android-cargo-${{ hashFiles('projectile_core/Cargo.toml') }}
          restore-keys: android-cargo-

      - name: Locate Android NDK
        run: |
          # Try common runner env vars in order of preference
          NDK="${ANDROID_NDK_LATEST_HOME:-}"
          if [ -z "$NDK" ]; then NDK="${ANDROID_NDK_ROOT:-}"; fi
          if [ -z "$NDK" ]; then NDK="${ANDROID_NDK_HOME:-}"; fi
          if [ -z "$NDK" ]; then
            NDK=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | sort -V | tail -1 || true)
          fi
          if [ -z "$NDK" ]; then echo "ERROR: NDK not found"; exit 1; fi
          echo "ANDROID_NDK_HOME=$NDK" >> $GITHUB_ENV
          echo "Using NDK: $NDK"

      - name: Build arm64-v8a
        working-directory: projectile_core
        run: cargo ndk -t arm64-v8a   -o ./android-out build --release

      - name: Build armeabi-v7a
        working-directory: projectile_core
        run: cargo ndk -t armeabi-v7a -o ./android-out build --release

      - name: Build x86_64 (emulator)
        working-directory: projectile_core
        run: cargo ndk -t x86_64      -o ./android-out build --release

      - uses: actions/upload-artifact@v4
        with:
          name: native-android
          path: projectile_core/android-out/
          retention-days: 1

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            projectile_core/target
          key: ios-cargo-${{ hashFiles('projectile_core/Cargo.toml') }}
          restore-keys: ios-cargo-

      - name: Build device arm64
        working-directory: projectile_core
        run: cargo build --release --target aarch64-apple-ios

      - name: Build simulator arm64 (Apple Silicon Mac)
        working-directory: projectile_core
        run: cargo build --release --target aarch64-apple-ios-sim

      - name: Build simulator x86_64 (Intel Mac)
        working-directory: projectile_core
        run: cargo build --release --target x86_64-apple-ios

      - name: Lipo simulator universal
        working-directory: projectile_core
        run: |
          lipo -create \
            target/aarch64-apple-ios-sim/release/libprojectile_core.a \
            target/x86_64-apple-ios/release/libprojectile_core.a \
            -output libprojectile_core_sim.a
          lipo -info libprojectile_core_sim.a

      - uses: actions/upload-artifact@v4
        with:
          name: native-ios-device
          path: projectile_core/target/aarch64-apple-ios/release/libprojectile_core.a
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: native-ios-sim
          path: projectile_core/libprojectile_core_sim.a
          retention-days: 1

  # ── KEY FIX: if: always() so this runs even if some build jobs failed ────────
  commit-to-repo:
    needs: [build-macos, build-windows, build-linux, build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: native-macos
          path: dl/macos
        continue-on-error: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: native-windows
          path: dl/windows
        continue-on-error: true

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: dl/linux
        continue-on-error: true

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-android
          path: dl/android
        continue-on-error: true

      - name: Download iOS device artifact
        uses: actions/download-artifact@v4
        with:
          name: native-ios-device
          path: dl/ios-device
        continue-on-error: true

      - name: Download iOS simulator artifact
        uses: actions/download-artifact@v4
        with:
          name: native-ios-sim
          path: dl/ios-sim
        continue-on-error: true

      - name: Show downloaded tree
        run: find dl -type f 2>/dev/null || echo "No artifacts downloaded"

      - name: Copy available libs into Unity plugin dirs
        run: |
          copy_if_exists() {
            local src="$1" dst="$2"
            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
              echo "✓ Copied: $dst"
            else
              echo "⚠ Missing (build failed?): $src — keeping existing in repo"
            fi
          }

          # macOS
          copy_if_exists \
            dl/macos/libprojectile_core.dylib \
            UnityProject/Assets/Plugins/Native/macOS/libprojectile_core.dylib

          # Windows
          copy_if_exists \
            dl/windows/projectile_core.dll \
            UnityProject/Assets/Plugins/Native/Windows/projectile_core.dll

          # Linux
          copy_if_exists \
            dl/linux/libprojectile_core.so \
            UnityProject/Assets/Plugins/Native/Linux/libprojectile_core.so

          # Android ABIs
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            copy_if_exists \
              "dl/android/$ABI/libprojectile_core.so" \
              "UnityProject/Assets/Plugins/Native/Android/$ABI/libprojectile_core.so"
          done

          # iOS
          copy_if_exists \
            dl/ios-device/libprojectile_core.a \
            UnityProject/Assets/Plugins/Native/iOS/libprojectile_core.a

          copy_if_exists \
            dl/ios-sim/libprojectile_core_sim.a \
            UnityProject/Assets/Plugins/Native/iOS/libprojectile_core_sim.a

      - name: Commit native libs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add UnityProject/Assets/Plugins/Native/
          git diff --staged --quiet \
            && echo "No lib changes — nothing to commit" \
            || git commit -m "ci: rebuild native libs [skip ci]"
          git push
